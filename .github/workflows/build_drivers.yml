name: Build Chromebook Drivers Free Edition
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Developer Command Prompt
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: amd64

    - name: Compile Both Free Drivers Direct
      run: |
        cl.exe /O2 /D_AMD64_ /D_KERNEL_MODE /c crosectypec.c
        link.exe /subsystem:native /driver /entry:DriverEntry /out:crosectypec.sys crosectypec.obj
        cl.exe /O2 /D_AMD64_ /D_KERNEL_MODE /c inteltcss.c
        link.exe /subsystem:native /driver /entry:DriverEntry /out:inteltcss.sys inteltcss.obj
        
    - name: Upload Both Finished Free Binaries
      uses: actions/upload-artifact@v4
      with:
        name: Clean-Free-Chromebook-Drivers
        path: |
          *.sys
